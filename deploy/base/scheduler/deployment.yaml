apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: crawler-system
  labels:
    app: scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: scheduler
        image: crawler/scheduler:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 8081
          name: api
        envFrom:
        - configMapRef:
            name: crawler-config
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 3
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: crawler-system
spec:
  selector:
    app: scheduler
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
  - name: api
    port: 8081
    targetPort: 8081
